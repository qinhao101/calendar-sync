name: 同步民宿日历

on:
  schedule:
    # 每30分钟运行一次（UTC时间）
    - cron: "*/30 * * * *"
  workflow_dispatch:
    # 允许手动触发

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: pip install requests icalendar

      - name: 运行同步脚本
        run: python sync.py

      - name: 提交并推送生成的文件
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet || git commit -m "自动同步日历 $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
